name: Core Quality Checks

on:
  pull_request:
    paths:
      - 'code/**'
      - 'tests/**'
      - '.github/workflows/core-quality.yml'
  push:
    branches:
      - main
    paths:
      - 'code/**'
      - 'tests/**'
      - '.github/workflows/core-quality.yml'

jobs:
  core-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: code/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        env:
          TMPDIR: /tmp
        run: npm test
